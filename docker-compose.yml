services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/scheduler

  frontend:
    build: ./frontend
    stdin_open: true
    tty: true
    depends_on:
      - backend
    environment:
      # Set to empty so requests use the same origin (HTTPS via Nginx)
      - REACT_APP_API_URL=

  nginx:
    build:
      context: ./nginx
      args:
        - HOST_IP=${HOST_IP:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data: